name: Flask CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar aplicación
        run: |
          python -m py_compile app.py

      - name: Login en GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Construir imagen Docker
        run: |
          docker build -t ghcr.io/yajanuha597/biblioteca-flask:latest .

      - name: Subir imagen a GHCR
        run: |
          docker push ghcr.io/yajanuha597/biblioteca-flask:latest